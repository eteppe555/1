<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dafr/title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Removes any microscopic bottom alignment gaps */
        }
    </style>
</head>
<body>

    <iframe id="gameFrame"></iframe>

    <script>
        fetch('https://cdn.jsdelivr.net/gh/eteppe555/1@latest/bacon.html')
            .then(response => response.text())
            .then(htmlCode => {
                const iframe = document.getElementById('gameFrame');
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(htmlCode);
                doc.close();

                // Inject CSS into the iframe to remove its internal body margins
                const style = doc.createElement('style');
                style.innerHTML = `
                    html, body {
                        margin: 0 !important;
                        padding: 0 !important;
                    }
                `;
                doc.head.appendChild(style);
            })
            .catch(err => {
                console.error("Failed to load the game code:", err);
            });
    </script>

</body>
</html>
