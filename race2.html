<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"/>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000000;
            overflow: hidden;
        }
        /* ── FULLSCREEN CONTAINER ── */
        #unity-container {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
        #unity-canvas {
            background: #000000;
            display: block;
            width: 100%;
            height: 100%;
        }
        /* ── ULTRA-CLEAN LOADING OVERLAY ── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            transition: opacity 0.5s ease;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px; /* Gap between logo and loading bar */
            width: clamp(200px, 28vw, 300px);
        }
        /* LOGO */
        .game-logo {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        /* SINGLE MINIMALIST LOADING BAR */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4af262;
            border-radius: 2px;
            transition: width 0.2s ease;
            box-shadow: 0 0 8px #4af262cc;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <!-- Clean, box-less overlay loader with only Logo and Bar -->
    <div id="loading-overlay">
        <div class="loading-container">
            <img class="game-logo" src="https://cdn.jsdelivr.net/gh/eteppe555/1@latest/Images/logo.png" alt="Loading Logo"/>
            <div class="progress-track">
                <div class="progress-fill" id="bar-fill"></div>
            </div>
        </div>
    </div>

    <script>
        const BUILD_CDN = "https://cdn.jsdelivr.net/gh/gulamen/c86c7@main/Build";
        const DATA_PARTS = 6; 
        const WASM_PARTS = 7; 

        const overlay = document.getElementById('loading-overlay');
        const barFill = document.getElementById('bar-fill');
        const canvas = document.querySelector('#unity-canvas');

        // Cleaned up loader logic to run error-free without missing text DOM elements
        function setBar(p) {
            barFill.style.width = p + '%';
        }

        /* Mobile viewport meta update */
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width,height=device-height,initial-scale=1.0,user-scalable=no,shrink-to-fit=yes';
            document.head.appendChild(meta);
        }

        document.addEventListener('contextmenu', e => e.preventDefault());

        // Safe focus check on user clicks to prevent focus-fight loop errors
        function focusGame() {
            if (document.activeElement !== canvas) {
                canvas.focus();
            }
        }
        canvas.addEventListener('pointerdown', focusGame);
        canvas.addEventListener('touchstart', focusGame);

        /* Part download & assembly sequence */
        async function fetchParts(baseName, partCount, barStart, barEnd) {
            const parts = [];
            for (let i = 0; i < partCount; i++) {
                setBar(barStart + (i / partCount) * (barEnd - barStart));
                const r = await fetch(`${BUILD_CDN}/${encodeURIComponent(baseName)}.part${i}`);
                if (!r.ok) throw new Error(`${baseName}.part${i}: HTTP ${r.status}`);
                parts.push(new Uint8Array(await r.arrayBuffer()));
            }
            setBar(barEnd);
            const total = parts.reduce((s, p) => s + p.length, 0);
            const merged = new Uint8Array(total);
            let off = 0;
            for (const p of parts) {
                merged.set(p, off);
                off += p.length;
            }
            return merged;
        }

        function brBlobUrl(uint8, filename) {
            const blob = new Blob([uint8], { type: 'application/octet-stream' });
            return URL.createObjectURL(blob) + '#' + encodeURIComponent(filename);
        }

        (async function () {
            try {
                setBar(0);
                /* 1) data.br */
                const dataBytes = await fetchParts('Survival car.data.br', DATA_PARTS, 0, 40);
                const dataUrl = brBlobUrl(dataBytes, 'Survival car.data.br');
                setBar(40);

                /* 2) wasm.br */
                const wasmBytes = await fetchParts('Survival car.wasm.br', WASM_PARTS, 40, 75);
                const wasmUrl = brBlobUrl(wasmBytes, 'Survival car.wasm.br');
                setBar(75);

                /* 3) Framework */
                const frameworkUrl = `${BUILD_CDN}/Survivalcar.framework.js`;

                /* 4) Config */
                const config = {
                    dataUrl: dataUrl,
                    frameworkUrl: frameworkUrl,
                    codeUrl: wasmUrl,
                    streamingAssetsUrl: 'StreamingAssets',
                    companyName: 'DefaultCompany',
                    productName: 'Survival Car Race',
                    productVersion: '0.0.01',
                    showBanner: (msg, type) => console[type === 'error' ? 'error' : 'warn'](msg),
                };

                /* 5) Loader */
                await new Promise((res, rej) => {
                    const s = document.createElement('script');
                    s.src = `${BUILD_CDN}/Survivalcar.loader.js`;
                    s.onload = res;
                    s.onerror = () => rej(new Error('Failed to load system files'));
                    document.body.appendChild(s);
                });
                setBar(80);

                /* 6) Instantiate Unity */
                const inst = await createUnityInstance(canvas, config, (p) => {
                    setBar(80 + Math.round(p * 20));
                });
                window.unityInstance = inst;
                setBar(100);
                
                // Elegant fade out once loaded
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    focusGame();
                }, 500);
            } catch (err) {
                console.error(err);
                setBar(0);
            }
        })();
    </script>
</body>
</html>
