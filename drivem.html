  <script>
    (function(){
      let done = false;
      function resumeAll(){
        if (done) return;
        done = true;
        try{
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          const ctx = window.__audioctx || new AC();
          window.__audioctx = ctx;
          if (ctx && ctx.state === "suspended") ctx.resume().catch(function(){});
        }catch(e){}
        window.removeEventListener("pointerdown", resumeAll);
        window.removeEventListener("keydown", resumeAll);
        window.removeEventListener("touchstart", resumeAll);
      }
      window.addEventListener("pointerdown", resumeAll, { once: true, passive: true });
      window.addEventListener("keydown", resumeAll, { once: true });
      window.addEventListener("touchstart", resumeAll, { once: true, passive: true });
    })();
  </script>
